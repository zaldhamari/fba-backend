name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Syntax check
        run: python -m py_compile backend/modules/routes.py backend/modules/main.py
      - name: Import check
        run: python -c "import backend.modules.routes" 2>/dev/null || python -c "from backend.modules import routes; print('imports ok')"
